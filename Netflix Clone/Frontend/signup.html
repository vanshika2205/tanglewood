<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body { background-color: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; }
        .box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 8px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #e50914; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Sign Up</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <p>Already have an account? <a href="login.html" style="color:white">Login</a></p>
    </div>

    <script>
        async function register() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("http://localhost:4000/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, password })
            });

            const data = await res.json();
            if(res.status === 201 || res.status === 200) {
                alert("Account created! Now login.");
                window.location.href = "login.html";
            } else {
                alert(data.message || "Registration failed");
            }
        }
    </script>
</body>
</html>
