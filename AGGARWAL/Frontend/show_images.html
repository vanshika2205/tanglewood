<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Viewer</title>
<style>
    body { font-family: sans-serif; background: #eee; }
    .grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .item { width: 150px; background: white; padding: 5px; text-align: center; border: 1px solid #ccc; }
    img { max-width: 100%; height: 120px; object-fit: contain; }
    .id-tag { font-size: 20px; font-weight: bold; color: red; margin-bottom: 5px; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
    const grid = document.getElementById('grid');
    for (let i = 1; i <= 85; i++) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div class="id-tag">ID: ${i}</div><img src="assets/image copy ${i}.png" onerror="this.parentElement.style.display='none'">`;
        grid.appendChild(div);
    }
</script>
</body>
</html>
